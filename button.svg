<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="520" height="68" viewBox="0 0 520 68">
  <defs>
    <linearGradient id="btnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f28"/>
      <stop offset="100%" stop-color="#0f1a24"/>
    </linearGradient>

    <linearGradient id="btnBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff2d9b"/>
      <stop offset="25%" stop-color="#ffe566"/>
      <stop offset="50%" stop-color="#5dff4a"/>
      <stop offset="75%" stop-color="#2de8ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>

    <linearGradient id="btnShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="btnGlow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#ff2d9b" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g filter="url(#btnGlow)">
    <rect x="2" y="2" width="516" height="64" rx="14" fill="url(#btnBg)"/>
    <rect x="2" y="2" width="516" height="64" rx="14" fill="url(#btnShine)"/>
    <rect x="2" y="2" width="516" height="64" rx="14" fill="none" stroke="url(#btnBorder)" stroke-width="2.5"/>
  </g>

  <!-- chameleon eye icon -->
  <g transform="translate(28, 18)">
    <circle cx="16" cy="16" r="15" fill="#f4f4f4"/>
    <circle cx="20" cy="16" r="7" fill="#120818"/>
    <circle cx="22" cy="14" r="2.5" fill="#ffffff"/>
    <path d="M 4 10 Q 0 4 6 0 Q 10 6 8 12" fill="#5dff4a"/>
    <path d="M 28 10 Q 32 4 26 0 Q 22 6 24 12" fill="#2de8ff"/>
  </g>

  <!-- paint drip accent -->
  <circle cx="78" cy="48" r="4" fill="#ff2d9b" opacity="0.8"/>
  <circle cx="88" cy="52" r="3" fill="#2de8ff" opacity="0.7"/>
  <circle cx="96" cy="46" r="2.5" fill="#ffe566" opacity="0.75"/>

  <text x="268" y="41" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="0.5" fill="#f5f5f7">Download Trainer Build</text>

  <!-- arrow -->
  <path d="M 448 34 L 468 34 M 458 26 L 468 34 L 458 42" fill="none" stroke="#5dff4a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
